<!DOCTYPE html>
<html>
<head>
    <title>QR Generator</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: rgb(255, 255, 255); border: none; }
    </style>
</head>
<body>
    <h1>Simple QR Code Generator</h1>
    <form action="/generate" method="post">
        <input type="text" name="text_input" placeholder="Enter link or text here" required>
        <button type="submit">Generate QR</button>
    </form>
    {% if qr_code %}
    <div style="margin-top: 20px;">
        <h3>Your Generated QR Code:</h3>
        <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
    </div>
{% endif %}
<button onclick="downloadQR()">Download QR Code</button>
<script>
    function downloadQR() {
        // 1. Get the image element
        const img = document.querySelector('img');
        if (!img) return;
    
        // 2. Create a temporary link element
        const link = document.createElement('a');
        
        // 3. Set the link's source to the image source (the Base64 string)
        link.href = img.src;
        
        // 4. Give the file a name
        link.download = 'my_qrcode.png';
        
        // 5. Trigger the download
        link.click();
    }
    </script>
</body>
</html>
